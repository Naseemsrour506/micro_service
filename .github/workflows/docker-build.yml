name: Build and Push Docker Images

on:
  push:
    branches:
      - branch1
      - main
      - master
  pull_request:
    branches:
      - main
      - master
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Get code from GitHub
        uses: actions/checkout@v4

      - name: Check docker compose file
	run: docker compose -f microservices-demo/docker-compose.yml config
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Python service image
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo:python-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo:python-${{ github.sha }}

      - name: Build and push Dotnet service image
        uses: docker/build-push-action@v6
        with:
          context: ./dotnet-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo:dotnet-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo:dotnet-${{ github.sha }}

      - name: Build and push Node service image
        uses: docker/build-push-action@v6
        with:
          context: ./node-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo:node-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo:node-${{ github.sha }}